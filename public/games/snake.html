<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Snake</title>
<link rel="stylesheet" href="/css/game.css">
<style>
  body { overflow: hidden; touch-action: none; }
  .game-wrap { gap: 8px; justify-content: center; }

  /* Swipe zone — full screen behind canvas, captures touch */
  #swipe-zone {
    position: fixed;
    inset: 0;
    z-index: 1;
    touch-action: none;
  }

  canvas { position: relative; z-index: 2; }

  .bottom-row {
    display: flex;
    gap: 10px;
    align-items: center;
    z-index: 2;
    position: relative;
  }

  .swipe-hint {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-align: center;
    z-index: 2;
    position: relative;
  }

  /* Swipe direction indicator (visual feedback) */
  #swipe-indicator {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 48px;
    opacity: 0;
    z-index: 10;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
  }
  #swipe-indicator.show {
    opacity: 0.6;
    transform: translate(-50%, -50%) scale(1);
  }
</style>
</head>
<body>

<!-- Full-screen swipe capture layer -->
<div id="swipe-zone"></div>
<div id="swipe-indicator"></div>

<div class="game-wrap">
  <div class="banner" id="result-banner" style="display:none">
    <div class="banner-title" id="result-text">GAME OVER</div>
    <div class="banner-sub" id="result-sub">—</div>
    <div style="display:flex;gap:12px;margin-top:4px">
      <button class="btn btn-cyan" id="play-again-btn">▶ PLAY AGAIN</button>
    </div>
  </div>

  <div class="hud">
    <div class="hud-title">SNAKE</div>
    <div class="hud-status" id="status-lbl">TAP TO START</div>
    <div class="hud-score">
      <span class="score-p1" id="score-disp">0</span>
      &nbsp;·&nbsp;
      <span style="color:var(--gold)" id="high-score">BEST: 0</span>
    </div>
  </div>

  <canvas id="cvs"></canvas>

  <div class="bottom-row">
    <button class="btn btn-cyan" id="start-btn">▶ START</button>
    <button class="btn btn-ghost" id="reset-btn">↺ RESET</button>
  </div>

  <div class="swipe-hint" id="hint-text">SWIPE TO TURN · WASD / ARROWS ON DESKTOP</div>
  <div class="game-toast" id="gtoast"></div>
</div>

<script src="/js/socket-bridge.js"></script>
<script>
if (isMulti && PLAYER === 1) {
  const ws = document.getElementById('waiting-screen');
  if (ws) ws.style.display = 'none';
}
window.parent.postMessage({ type: 'iframe:ready' }, '*');
</script>
<script>
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const COLS = 20, ROWS = 20;

// Fit canvas to screen — leave room for HUD + buttons
function calcCell() {
  const maxW = Math.min(window.innerWidth - 24, 500);
  const maxH = window.innerHeight - 160;
  return Math.min(Math.floor(maxW / COLS), Math.floor(maxH / ROWS), 28);
}
let CELL = calcCell();
cvs.width = COLS * CELL;
cvs.height = ROWS * CELL;

window.addEventListener('resize', () => {
  CELL = calcCell();
  cvs.width = COLS * CELL;
  cvs.height = ROWS * CELL;
  draw();
});

let snake = [{x:10,y:10}], dir = {x:1,y:0}, nextDir = {x:1,y:0};
let food = null, score = 0, highScore = 0;
let running = false, gameOver = false, gameLoopId = null, speed = 150;

function randFood() {
  let pos;
  do { pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===pos.x && s.y===pos.y));
  return pos;
}

function reset() {
  snake = [{x:10,y:10}]; dir = {x:1,y:0}; nextDir = {x:1,y:0};
  food = randFood(); score = 0; running = false; gameOver = false; speed = 150;
  clearInterval(gameLoopId); gameLoopId = null;
  document.getElementById('result-banner').style.display = 'none';
  document.getElementById('score-disp').textContent = '0';
  document.getElementById('status-lbl').textContent = 'TAP TO START';
  draw();
}

function startGame() {
  if (gameOver || running) return;
  running = true;
  document.getElementById('status-lbl').textContent = '▶ PLAYING';
  gameLoopId = setInterval(tick, speed);
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('reset-btn').addEventListener('click', reset);
document.getElementById('play-again-btn').addEventListener('click', reset);

function tick() {
  dir = nextDir;
  const head = {
    x: (snake[0].x + dir.x + COLS) % COLS,
    y: (snake[0].y + dir.y + ROWS) % ROWS
  };
  if (snake.some(s => s.x===head.x && s.y===head.y)) {
    running = false; gameOver = true;
    clearInterval(gameLoopId); gameLoopId = null;
    highScore = Math.max(highScore, score);
    document.getElementById('high-score').textContent = `BEST: ${highScore}`;
    document.getElementById('result-text').textContent = 'GAME OVER';
    document.getElementById('result-sub').textContent = `SCORE: ${score}`;
    document.getElementById('result-banner').style.display = 'flex';
    return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score += 10;
    food = randFood();
    document.getElementById('score-disp').textContent = score;
    if (score % 50 === 0) {
      clearInterval(gameLoopId);
      speed = Math.max(60, speed - 15);
      if (running) gameLoopId = setInterval(tick, speed);
    }
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#050810';
  ctx.fillRect(0, 0, cvs.width, cvs.height);
  // Grid
  ctx.strokeStyle = 'rgba(0,200,255,0.04)'; ctx.lineWidth = 1;
  for (let x=0;x<COLS;x++) { ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,cvs.height);ctx.stroke(); }
  for (let y=0;y<ROWS;y++) { ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(cvs.width,y*CELL);ctx.stroke(); }
  // Food
  if (food) {
    ctx.shadowColor = '#ff8c00'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#ffa500';
    ctx.beginPath();
    ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL*0.38, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(food.x*CELL+CELL*0.3, food.y*CELL+CELL*0.3, CELL*0.12, 0, Math.PI*2);
    ctx.fill();
  }
  // Snake body
  snake.forEach((seg, i) => {
    const t = i / Math.max(snake.length, 1);
    ctx.fillStyle = `rgb(${Math.round(t*20)},${Math.round(200-t*80)},${Math.round(255-t*100)})`;
    ctx.shadowColor = i===0 ? '#00c8ff' : 'transparent';
    ctx.shadowBlur = i===0 ? 16 : 0;
    const pad = i===0 ? 1 : 2;
    ctx.beginPath();
    ctx.roundRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, 5);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Head eyes
    if (i === 0) {
      const ex = dir.x, ey = dir.y;
      const cx2 = seg.x*CELL+CELL/2+ex*CELL*0.2;
      const cy2 = seg.y*CELL+CELL/2+ey*CELL*0.2;
      const offX = ey!==0 ? CELL*0.2 : 0;
      const offY = ex!==0 ? CELL*0.2 : 0;
      ctx.fillStyle = '#001a33';
      ctx.beginPath(); ctx.arc(cx2+offX, cy2+offY, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx2-offX, cy2-offY, 2.5, 0, Math.PI*2); ctx.fill();
    }
  });
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
    w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0}
  };
  const d = map[e.key];
  if (d && !(d.x===-dir.x && d.y===0) && !(d.y===-dir.y && d.x===0)) {
    nextDir = d; e.preventDefault();
  }
  if ((e.key===' ' || e.key==='Enter') && !running && !gameOver) startGame();
});

// ── Swipe gesture (touch anywhere on screen) ──
let touchStartX = 0, touchStartY = 0;
const SWIPE_MIN = 30; // minimum px to count as swipe
const swipeIndicator = document.getElementById('swipe-indicator');

function showSwipeHint(emoji) {
  swipeIndicator.textContent = emoji;
  swipeIndicator.classList.add('show');
  clearTimeout(swipeIndicator._t);
  swipeIndicator._t = setTimeout(() => swipeIndicator.classList.remove('show'), 300);
}

function handleSwipeStart(x, y) {
  touchStartX = x; touchStartY = y;
}

function handleSwipeEnd(x, y) {
  const dx = x - touchStartX;
  const dy = y - touchStartY;
  if (Math.abs(dx) < SWIPE_MIN && Math.abs(dy) < SWIPE_MIN) {
    // Tap = start game
    if (!running && !gameOver) { startGame(); return; }
    return;
  }
  let newDir;
  if (Math.abs(dx) > Math.abs(dy)) {
    // Horizontal swipe
    if (dx > 0 && dir.x !== -1) { newDir = {x:1,y:0}; showSwipeHint('▶'); }
    else if (dx < 0 && dir.x !== 1) { newDir = {x:-1,y:0}; showSwipeHint('◀'); }
  } else {
    // Vertical swipe
    if (dy > 0 && dir.y !== -1) { newDir = {x:0,y:1}; showSwipeHint('▼'); }
    else if (dy < 0 && dir.y !== 1) { newDir = {x:0,y:-1}; showSwipeHint('▲'); }
  }
  if (newDir) nextDir = newDir;
}

// Attach to the full-screen swipe zone
const swipeZone = document.getElementById('swipe-zone');
swipeZone.addEventListener('touchstart', e => {
  e.preventDefault();
  handleSwipeStart(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

swipeZone.addEventListener('touchend', e => {
  e.preventDefault();
  handleSwipeEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}, { passive: false });

// Also on canvas directly
cvs.addEventListener('touchstart', e => {
  e.preventDefault();
  handleSwipeStart(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

cvs.addEventListener('touchend', e => {
  e.preventDefault();
  handleSwipeEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}, { passive: false });

function showToast(msg) {
  const t = document.getElementById('gtoast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

reset();
</script>
</body>
</html>
